<!DOCTYPE html>

<html class="light" lang="tr"><head>

<style>
        body {
            background-color: #f6fafe; /* background color */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Floating Label Styles */
        .float-input-container {
            position: relative;
            background-color: #f0f4f8; /* surface-container-low */
            border-radius: 4px 4px 0 0;
            border-bottom: 1px solid #737686; /* outline */
            transition: border-color 0.2s;
        }

        .float-input-container:focus-within {
            border-bottom: 2px solid #004ac6; /* primary */
        }

        .float-input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 24px 16px 8px 16px;
            color: #171c1f; /* on-surface */
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 24px;
        }
        
        .float-input:focus {
            outline: none;
            box-shadow: none;
        }

        .float-label {
            position: absolute;
            left: 16px;
            top: 16px;
            color: #434655; /* on-surface-variant */
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            transition: all 0.2s ease-out;
            pointer-events: none;
        }

        .float-input:focus ~ .float-label,
        .float-input:not(:placeholder-shown) ~ .float-label {
            top: 6px;
            font-size: 12px;
            color: #004ac6; /* primary */
        }
        
        .float-input:not(:focus):not(:placeholder-shown) ~ .float-label {
            color: #434655; /* on-surface-variant */
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col items-center">
<!-- Desktop Centered Container -->
<div class="w-full max-w-[480px] bg-background min-h-screen relative flex flex-col md:shadow-sm md:border-x md:border-border">
<!-- TopAppBar -->
<header class="w-full h-[64px] flex items-center bg-surface border-b border-outline-variant px-margin-mobile flex justify-between items-center sticky top-0 z-50">
<button class="text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-low transition-colors px-2 py-1 rounded active:scale-95 duration-100">
                İptal
            </button>
<h1 class="font-title-lg text-title-lg text-primary font-bold">
                Yeni Grup
            </h1>
<!-- Disabled State Default as per requirements -->
<button class="text-on-surface-variant opacity-50 font-label-md text-label-md px-2 py-1 rounded cursor-not-allowed" disabled="">
                Kaydet
            </button>
</header>
<!-- Main Content -->
<main class="flex-1 p-margin-mobile flex flex-col gap-unit">
<!-- Form Card -->
<div class="bg-surface rounded-xl p-[16px] flex flex-col gap-[16px] shadow-sm border border-border">
<!-- Group Name Input -->
<div>
<div class="float-input-container h-[56px]">
<input class="float-input" id="groupName" maxlength="60" placeholder=" " type="text"/>
<label class="float-label" for="groupName">Grup Adı *</label>
</div>
<div class="flex justify-end mt-1 px-4">
<span class="font-caption text-caption text-on-surface-variant" id="charCount">0/60</span>
</div>
</div>
<!-- Description Input -->
<div class="float-input-container min-h-[88px] h-auto">
<textarea class="float-input resize-none h-[88px]" id="groupDesc" placeholder=" "></textarea>
<label class="float-label" for="groupDesc">Açıklama</label>
</div>
<!-- Optional Helper Text simulated by placeholder logic in standard design -->
<div class="px-4 -mt-2">
<span class="font-caption text-caption text-on-surface-variant">İsteğe bağlı...</span>
</div>
</div>
<!-- Helper Info -->
<div class="flex items-start gap-2 mt-2 px-2">
<span class="material-symbols-outlined text-info" style="font-size: 20px;">info</span>
<p class="text-[13px] leading-[18px] text-info font-body-md">
                    Öğrenciler gruba önceden eklenmez — sınava katılırken otomatik eklenir
                </p>
</div>
</main>
</div>
<script>
        // Simple character counter logic
        const groupNameInput = document.getElementById('groupName');
        const charCountDisplay = document.getElementById('charCount');

        groupNameInput.addEventListener('input', function() {
            const currentLength = this.value.length;
            charCountDisplay.textContent = `${currentLength}/60`;
        });
    </script>
</body></html>
