<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ExamKit - Sequential Exam</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-lowest": "#ffffff",
                      "primary-fixed": "#dbe1ff",
                      "on-primary-fixed": "#00174b",
                      "secondary-container": "#d5e3fc",
                      "on-secondary": "#ffffff",
                      "on-primary-fixed-variant": "#003ea8",
                      "secondary-fixed": "#d5e3fc",
                      "on-secondary-container": "#57657a",
                      "tertiary-container": "#007d57",
                      "tertiary-fixed": "#85f8c4",
                      "inverse-primary": "#b4c5ff",
                      "on-surface-variant": "#434655",
                      "on-primary-container": "#eeefff",
                      "success-light": "#D1FAE5",
                      "on-tertiary-container": "#bdffdc",
                      "background": "#f6fafe",
                      "on-surface": "#171c1f",
                      "surface-dim": "#d6dade",
                      "error": "#DC2626",
                      "surface": "#FFFFFF",
                      "info": "#0284C7",
                      "surface-container-high": "#e4e9ed",
                      "error-light": "#FEE2E2",
                      "surface-bright": "#f6fafe",
                      "warning-light": "#FEF3C7",
                      "warning": "#D97706",
                      "on-tertiary-fixed": "#002114",
                      "surface-container-low": "#f0f4f8",
                      "tertiary-fixed-dim": "#68dba9",
                      "on-error": "#ffffff",
                      "surface-container-highest": "#dfe3e7",
                      "outline-variant": "#c3c6d7",
                      "surface-container": "#eaeef2",
                      "inverse-on-surface": "#edf1f5",
                      "text-primary": "#0F172A",
                      "border": "#E2E8F0",
                      "secondary-fixed-dim": "#b9c7df",
                      "on-primary": "#ffffff",
                      "inverse-surface": "#2c3134",
                      "on-error-container": "#93000a",
                      "primary-container": "#2563eb",
                      "primary-dark": "#1E40AF",
                      "success": "#059669",
                      "on-secondary-fixed": "#0d1c2e",
                      "surface-tint": "#0053db",
                      "info-light": "#E0F2FE",
                      "tertiary": "#006243",
                      "surface-variant": "#dfe3e7",
                      "on-tertiary-fixed-variant": "#005137",
                      "primary-fixed-dim": "#b4c5ff",
                      "primary": "#004ac6",
                      "error-container": "#ffdad6",
                      "primary-light": "#DBEAFE",
                      "on-tertiary": "#ffffff",
                      "on-secondary-fixed-variant": "#3a485b",
                      "secondary": "#515f74",
                      "outline": "#737686",
                      "on-background": "#171c1f"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "unit": "8px",
                      "margin-desktop": "24px",
                      "margin-mobile": "16px",
                      "gutter": "16px",
                      "container-max-student": "480px"
              },
              "fontFamily": {
                      "headline": ["Inter"],
                      "display": ["Inter"],
                      "label-md": ["Inter"],
                      "title-lg": ["Inter"],
                      "caption": ["Inter"],
                      "body-lg": ["Inter"],
                      "title-md": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "headline": ["26px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "display": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                      "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #F1F5F9; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .animate-progress {
            animation: shrink 28s linear forwards;
        }
        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex justify-center pb-[88px]">
<div class="w-full max-w-container-max-student flex flex-col min-h-screen relative shadow-sm bg-background">
<!-- Sticky Top Bar -->
<header class="sticky top-0 z-50 bg-surface border-b border-surface-variant w-full h-[64px] flex justify-between items-center px-margin-mobile">
<div class="w-10"></div> <!-- Placeholder for balance -->
<h1 class="font-title-md text-title-md text-on-surface">Soru 7 / 20</h1>
<div class="flex items-center gap-2 text-primary font-label-md text-label-md">
<span class="material-symbols-outlined text-[20px]">timer</span>
<span>42:15</span>
</div>
</header>
<!-- Question Timer Progress -->
<div class="w-full bg-surface-container-high h-[4px] relative">
<div class="absolute top-0 left-0 h-full bg-primary animate-progress rounded-r-full"></div>
</div>
<div class="px-margin-mobile py-2 flex justify-end">
<span class="font-caption text-caption text-warning font-semibold">28 sn kaldı</span>
</div>
<!-- Main Content -->
<main class="flex-1 px-margin-mobile py-4 flex flex-col gap-6">
<!-- Question Card -->
<div class="bg-surface rounded-2xl p-[24px] shadow-sm min-h-[200px] flex flex-col gap-4 border border-border">
<p class="font-body-lg text-body-lg text-on-surface font-semibold leading-relaxed">
                    Aşağıdakilerden hangisi hücre zarının görevlerinden biri değildir?
                </p>
<!-- Optional Image Placeholder if needed for a question -->
<!-- <div class="w-full h-40 bg-surface-container rounded-lg border border-surface-variant flex items-center justify-center text-on-surface-variant">
                    <span class="material-symbols-outlined text-[32px]">image</span>
                </div> -->
</div>
<!-- Options List -->
<div class="flex flex-col gap-[12px]">
<!-- Option A -->
<button class="w-full h-[64px] rounded-xl border-2 border-border bg-surface flex items-center px-4 gap-4 transition-all duration-200 hover:border-primary-fixed-dim hover:bg-surface-container-lowest text-left active:scale-[0.98]">
<div class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant shrink-0">
                        A
                    </div>
<span class="font-body-md text-body-md text-on-surface flex-1 line-clamp-2">Madde alışverişini sağlamak</span>
</button>
<!-- Option B (Selected State Example) -->
<button class="w-full h-[64px] rounded-xl border-2 border-primary-container bg-primary-container flex items-center px-4 gap-4 transition-all duration-200 transform scale-[1.02] shadow-sm text-left relative overflow-hidden">
<div class="w-8 h-8 rounded-full bg-on-primary text-primary-container flex items-center justify-center font-label-md text-label-md font-bold shrink-0">
                        B
                    </div>
<span class="font-body-md text-body-md text-on-primary font-medium flex-1 line-clamp-2">Hücreye şekil vermek</span>
<span class="material-symbols-outlined text-on-primary absolute right-4" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option C -->
<button class="w-full h-[64px] rounded-xl border-2 border-border bg-surface flex items-center px-4 gap-4 transition-all duration-200 hover:border-primary-fixed-dim hover:bg-surface-container-lowest text-left active:scale-[0.98]">
<div class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant shrink-0">
                        C
                    </div>
<span class="font-body-md text-body-md text-on-surface flex-1 line-clamp-2">Protein sentezini gerçekleştirmek</span>
</button>
<!-- Option D -->
<button class="w-full h-[64px] rounded-xl border-2 border-border bg-surface flex items-center px-4 gap-4 transition-all duration-200 hover:border-primary-fixed-dim hover:bg-surface-container-lowest text-left active:scale-[0.98]">
<div class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant shrink-0">
                        D
                    </div>
<span class="font-body-md text-body-md text-on-surface flex-1 line-clamp-2">Hücreyi dış etkenlerden korumak</span>
</button>
</div>
</main>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 left-0 w-full z-40 bg-surface/90 backdrop-blur-sm border-t border-surface-variant p-margin-mobile flex justify-center pb-safe">
<div class="w-full max-w-container-max-student flex flex-col gap-2">
<!-- Button is active in this mockup because an option is selected. 
                     If no option was selected, add classes: opacity-40 cursor-not-allowed -->
<button class="w-full h-[56px] bg-primary-container text-on-primary rounded-xl font-title-md text-title-md flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-sm">
                    İlerle
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Helper text shown when button is disabled (hidden here, uncomment to see) -->
<!-- <span class="text-center font-caption text-caption text-on-surface-variant">önce cevap verin</span> -->
</div>
</div>
</div>
</body></html>
