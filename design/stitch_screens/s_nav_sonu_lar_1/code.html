        body {
            background-color: #F1F5F9;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="font-body-md text-body-md text-text-primary antialiased min-h-screen flex justify-center">
<div class="w-full max-w-container-max-student bg-[#F1F5F9] min-h-screen relative pb-24 shadow-lg md:my-8 md:min-h-[auto] md:rounded-xl overflow-hidden flex flex-col">
<!-- TopAppBar: Transactional, hidden shell navs -->
<header class="bg-surface border-b border-border h-[64px] flex items-center px-margin-mobile sticky top-0 z-10 shrink-0">
<button aria-label="Go back home" class="w-12 h-12 flex items-center justify-center -ml-3 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-[24px] text-text-primary">home</span>
</button>
<h1 class="flex-1 text-center font-title-md text-title-md text-text-primary mr-12">Sonuçlar</h1>
</header>
<main class="flex-1 overflow-y-auto px-margin-mobile py-6 space-y-6">
<!-- Score Hero Card -->
<section class="bg-surface rounded-[24px] p-7 flex flex-col items-center justify-center text-center shadow-sm border border-border/50 relative overflow-hidden">
<!-- Decorative background blob -->
<div class="absolute top-0 right-0 -mt-10 -mr-10 w-32 h-32 bg-success-light/30 rounded-full blur-2xl pointer-events-none"></div>
<div class="relative w-[120px] h-[120px] mb-4 flex items-center justify-center">
<svg class="absolute inset-0 w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="#E2E8F0" stroke-width="8"></circle>
<circle class="transition-all duration-1000 ease-out" cx="50" cy="50" fill="none" r="45" stroke="#059669" stroke-dasharray="283" stroke-dashoffset="11.32" stroke-width="8"></circle> <!-- 96% of 2*pi*45 -->
</svg>
<div class="text-[36px] font-bold text-success leading-tight">%96</div>
</div>
<div class="flex items-baseline space-x-2 mb-2">
<span class="text-[32px] font-bold text-text-primary">48</span>
<span class="text-[20px] font-medium text-outline">/ 50</span>
<span class="font-body-lg text-body-lg text-on-surface-variant ml-1">puan</span>
</div>
<div class="inline-flex items-center px-3 py-1.5 rounded-full bg-warning-light text-warning mb-4">
<span class="mr-1.5 text-lg">🥇</span>
<span class="font-label-md text-label-md">Sınıfta 1. sıradasınız</span>
</div>
<p class="font-caption text-caption text-on-surface-variant flex items-center">
<span class="material-symbols-outlined text-[16px] mr-1">timer</span>
                    18 dakika 32 saniyede tamamladınız
                </p>
</section>
<!-- Summary Row -->
<section class="bg-surface rounded-xl p-4 shadow-sm border border-border/50 grid grid-cols-3 divide-x divide-border">
<div class="flex flex-col items-center justify-center px-2">
<span class="text-[24px] font-bold text-success flex items-center">
                        46 <span class="material-symbols-outlined text-[20px] ml-1">check</span>
</span>
<span class="font-caption text-caption text-on-surface-variant mt-1">Doğru</span>
</div>
<div class="flex flex-col items-center justify-center px-2">
<span class="text-[24px] font-bold text-error flex items-center">
                        3 <span class="material-symbols-outlined text-[20px] ml-1">close</span>
</span>
<span class="font-caption text-caption text-on-surface-variant mt-1">Yanlış</span>
</div>
<div class="flex flex-col items-center justify-center px-2">
<span class="text-[24px] font-bold text-secondary flex items-center">
                        1 <span class="material-symbols-outlined text-[20px] ml-1">remove</span>
</span>
<span class="font-caption text-caption text-on-surface-variant mt-1">Boş</span>
</div>
</section>
<!-- Leaderboard -->
<section class="space-y-3">
<h2 class="font-title-md text-title-md text-text-primary flex items-center">
<span class="material-symbols-outlined mr-2 text-primary">leaderboard</span>
                    Sınıf Sıralaması
                </h2>
<div class="bg-surface rounded-xl overflow-hidden shadow-sm border border-border/50">
<ul class="divide-y divide-border">
<li class="flex items-center px-4 py-3 bg-primary-light/30 border-l-4 border-primary">
<span class="w-8 font-bold text-primary text-center">1</span>
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-bold text-sm mx-3">Sen</div>
<span class="flex-1 font-label-md text-label-md text-text-primary">Sen (Ahmet Y.)</span>
<span class="font-bold text-text-primary">96%</span>
</li>
<li class="flex items-center px-4 py-3">
<span class="w-8 font-medium text-on-surface-variant text-center">2</span>
<div class="w-8 h-8 rounded-full bg-surface-variant text-secondary flex items-center justify-center font-bold text-sm mx-3">ZK</div>
<span class="flex-1 font-body-md text-body-md text-on-surface-variant">Zeynep K.</span>
<span class="font-medium text-text-primary">92%</span>
</li>
<li class="flex items-center px-4 py-3">
<span class="w-8 font-medium text-on-surface-variant text-center">3</span>
<div class="w-8 h-8 rounded-full bg-surface-variant text-secondary flex items-center justify-center font-bold text-sm mx-3">MC</div>
<span class="flex-1 font-body-md text-body-md text-on-surface-variant">Mehmet C.</span>
<span class="font-medium text-text-primary">88%</span>
</li>
</ul>
</div>
</section>
</main>
</div>
