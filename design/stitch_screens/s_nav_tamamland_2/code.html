<style>
        .checkmark-circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 4;
            stroke-miterlimit: 10;
            stroke: #059669; /* success */
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            stroke-width: 4;
            stroke: #059669; /* success */
            stroke-miterlimit: 10;
            margin: 10% auto;
            box-shadow: inset 0px 0px 0px #059669;
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
        }

        .checkmark-check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke {
            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes scale {
            0%, 100% {
                transform: none;
            }
            50% {
                transform: scale3d(1.1, 1.1, 1);
            }
        }

        @keyframes fill {
            100% {
                box-shadow: inset 0px 0px 0px 30px #D1FAE5; /* success-light */
            }
        }
        
        .dot-anim:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .loading-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background-color: #2563eb; /* primary-container */
            width: 0;
            animation: loadProgress 2s ease-in-out infinite alternate;
            border-radius: 0 0 0.5rem 0.5rem;
        }
        
        @keyframes loadProgress {
            0% { width: 0; }
            100% { width: 100%; }
        }
    </style>
<style>
    body {

<body class="bg-surface text-on-surface h-screen w-screen flex items-center justify-center m-0 p-0 overflow-hidden font-body-md">
<!-- Mobile-first Container -->
<main class="w-full max-w-container-student h-full flex flex-col items-center justify-center p-margin-mobile relative">
<!-- Center Content Card -->
<div class="relative bg-surface rounded-xl flex flex-col items-center justify-center p-8 w-full max-w-sm text-center">
<!-- Animated Green Checkmark -->
<div class="mb-6 flex justify-center w-full">
<svg class="checkmark" viewbox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
<circle class="checkmark-circle" cx="26" cy="26" fill="none" r="25"></circle>
<path class="checkmark-check" d="M14.1 27.2l7.1 7.2 16.7-16.8" fill="none"></path>
</svg>
</div>
<!-- Headline -->
<h1 class="font-headline text-headline text-text-primary mb-2">
                Sınav Tamamlandı! 🎉
            </h1>
<!-- Subtext with Dot Animation -->
<p class="font-body-lg text-body-lg text-on-surface-variant flex items-center justify-center">
                Sonuçlar hesaplanıyor<span class="dot-anim inline-block w-4 text-left"></span>
</p>
<!-- Loading Bar -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-surface-container-low rounded-b-xl overflow-hidden">
<div class="h-full bg-primary-container animate-[loadProgress_2s_ease-in-out_infinite_alternate]"></div>
</div>
</div>
</main>
<!-- Contextual FAB Suppression: No FAB on this transitional screen -->
<!-- Shell Visibility & Relevance: No TopAppBar or BottomNavBar as this is a linear/transactional success screen -->
</body></html>
