<!-- Script for Range Slider Gradient Update -->
<script>
        const rangeInput = document.querySelector('input[type="range"]');
        
        function updateSliderGradient(val) {
            const min = rangeInput.min || 5;
            const max = rangeInput.max || 180;
            const percentage = ((val - min) / (max - min)) * 100;
            rangeInput.style.background = `linear-gradient(to right, #2563eb 0%, #2563eb ${percentage}%, #E2E8F0 ${percentage}%, #E2E8F0 100%)`;
        }

        rangeInput.addEventListener('input', function(e) {
            // Update display text (optional if you want it live, but static in prompt is fine, just showing capability)
            // e.target.previousElementSibling.children[1].innerText = e.target.value + " dakika";
            updateSliderGradient(e.target.value);
        });
        
        // Initial call
        updateSliderGradient(rangeInput.value);
    </script>
