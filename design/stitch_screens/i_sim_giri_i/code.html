<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ExamKit - Name Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed-variant": "#003ea8",
                      "border": "#E2E8F0",

                      "on-secondary-fixed": "#0d1c2e",
                      "primary-container": "#2563eb",
                      "on-secondary-fixed-variant": "#3a485b",
                      "success-light": "#D1FAE5",
                      "on-tertiary-fixed": "#002114",
                      "info": "#0284C7",
                      "tertiary-container": "#007d57",
                      "error": "#DC2626",
                      "on-secondary": "#ffffff",
                      "tertiary": "#006243",
                      "secondary": "#515f74",
                      "inverse-primary": "#b4c5ff",
                      "surface-container-high": "#e4e9ed",
                      "primary-dark": "#1E40AF",
                      "info-light": "#E0F2FE",
                      "on-surface-variant": "#434655",
                      "inverse-surface": "#2c3134",
                      "success": "#059669",
                      "on-primary": "#ffffff",
                      "on-error-container": "#93000a",
                      "warning": "#D97706",
                      "on-tertiary-container": "#bdffdc",
                      "surface-dim": "#d6dade",
                      "primary-fixed-dim": "#b4c5ff",
                      "error-light": "#FEE2E2",
                      "surface-container-highest": "#dfe3e7",
                      "text-primary": "#0F172A",
                      "surface-tint": "#0053db",
                      "warning-light": "#FEF3C7",
                      "surface-container-low": "#f0f4f8",
                      "inverse-on-surface": "#edf1f5",
                      "surface-bright": "#f6fafe",
                      "outline": "#737686",
                      "error-container": "#ffdad6",
                      "secondary-fixed-dim": "#b9c7df",
                      "background": "#f6fafe",
                      "surface-container": "#eaeef2",
                      "primary": "#004ac6",
                      "on-background": "#171c1f",
                      "tertiary-fixed-dim": "#68dba9",
                      "primary-fixed": "#dbe1ff",
                      "on-secondary-container": "#57657a",
                      "on-tertiary": "#ffffff",
                      "surface": "#FFFFFF",
                      "surface-variant": "#dfe3e7",
                      "on-primary-fixed": "#00174b",
                      "primary-light": "#DBEAFE",
                      "tertiary-fixed": "#85f8c4",
                      "on-tertiary-fixed-variant": "#005137",
                      "secondary-fixed": "#d5e3fc",
                      "on-primary-container": "#eeefff",
                      "on-error": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "secondary-container": "#d5e3fc",
                      "outline-variant": "#c3c6d7"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin-mobile": "16px",
                      "unit": "8px",
                      "gutter": "16px",
                      "container-max-student": "480px",
                      "margin-desktop": "24px"
              },
              "fontFamily": {
                      "display": ["Inter", "sans-serif"],
                      "caption": ["Inter", "sans-serif"],
                      "title-lg": ["Inter", "sans-serif"],
                      "headline": ["Inter", "sans-serif"],
                      "body-lg": ["Inter", "sans-serif"],
                      "title-md": ["Inter", "sans-serif"],
                      "body-md": ["Inter", "sans-serif"],
                      "label-md": ["Inter", "sans-serif"]
              },
              "fontSize": {
                      "display": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                      "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "headline": ["26px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],

                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}]

      },
          },
        }

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f6fafe; /* background */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex justify-center min-h-screen">
<div class="w-full max-w-container-max-student bg-surface min-h-screen relative shadow-sm flex flex-col">
<!-- TopAppBar (Simplified for transactional page) -->
<header class="w-full h-[64px] flex items-center bg-surface px-margin-mobile border-b border-border">
<button aria-label="Go back" class="text-on-surface-variant active:scale-95 duration-100 transition-transform mr-4">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface">Sınava Katıl</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-unit-3 flex flex-col gap-gutter">
<!-- Exam Info Banner -->
<div class="bg-primary-light rounded-xl p-unit-2 flex items-center gap-unit-2 border border-primary-container/20">
<div class="bg-primary-container text-on-primary w-10 h-10 rounded-lg flex items-center justify-center shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">book</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md text-on-surface">Biologiya Final İmtahanı</span>
<span class="font-body-md text-body-md text-on-surface-variant">Kamran müəllim · 9-A sinifi</span>
</div>
</div>
<!-- Content Card -->
<div class="bg-surface border border-border rounded-xl p-unit-2 flex flex-col gap-unit-2 mt-unit-2 shadow-sm">
<h2 class="font-headline text-headline text-on-surface mb-unit-1">Adınızı girin</h2>
<div class="flex flex-col gap-unit-2">
<!-- Ad Input -->
<div class="relative w-full">
<input class="peer w-full h-[56px] border border-outline rounded-lg px-unit-2 pt-unit-2 pb-1 font-body-md text-body-md text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors bg-surface placeholder-transparent" id="firstName" placeholder="Ad" type="text"/>
<label class="absolute left-unit-2 top-1 text-xs text-on-surface-variant transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-focus:top-1 peer-focus:text-xs peer-focus:text-primary-container pointer-events-none" for="firstName">Ad</label>
</div>
<!-- Soyad Input -->
<div class="relative w-full">
<input class="peer w-full h-[56px] border border-outline rounded-lg px-unit-2 pt-unit-2 pb-1 font-body-md text-body-md text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors bg-surface placeholder-transparent" id="lastName" placeholder="Soyad" type="text"/>
<label class="absolute left-unit-2 top-1 text-xs text-on-surface-variant transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-focus:top-1 peer-focus:text-xs peer-focus:text-primary-container pointer-events-none" for="lastName">Soyad</label>
</div>
</div>
</div>
<!-- Privacy Note -->
<div class="flex items-center gap-unit-1 justify-center mt-unit-1 px-unit-1">
<span class="material-symbols-outlined text-on-surface-variant text-sm" style="font-variation-settings: 'FILL' 0;">assignment</span>
<p class="font-caption text-caption text-on-surface-variant text-center">Adınız öğretmeninizde görünecek</p>
</div>
<!-- Action Area (Pushed to bottom) -->
<div class="mt-auto pt-unit-4 pb-unit-2">
<button class="w-full h-[56px] bg-primary-container text-on-primary font-title-md text-title-md rounded-lg active:scale-95 duration-100 transition-transform shadow-sm hover:shadow-md flex items-center justify-center gap-unit-1">
<span>Sınava Katıl</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</main>
</div>
</body></html>
