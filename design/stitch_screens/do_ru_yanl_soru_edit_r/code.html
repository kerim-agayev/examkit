<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ExamKit - Doğru / Yanlış Soru</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#171c1f",
                        "on-primary-fixed": "#00174b",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-dim": "#d6dade",
                        "background": "#f6fafe",
                        "surface-container-lowest": "#ffffff",
                        "primary-dark": "#1E40AF",
                        "surface-tint": "#0053db",
                        "secondary-fixed": "#d5e3fc",
                        "info-light": "#E0F2FE",
                        "warning": "#D97706",
                        "success-light": "#D1FAE5",
                        "success": "#059669",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#007d57",
                        "secondary-container": "#d5e3fc",
                        "inverse-primary": "#b4c5ff",
                        "info": "#0284C7",
                        "surface-bright": "#f6fafe",
                        "primary-fixed-dim": "#b4c5ff",
                        "secondary": "#515f74",
                        "on-primary": "#ffffff",
                        "error-light": "#FEE2E2",
                        "surface-container-highest": "#dfe3e7",
                        "tertiary": "#006243",
                        "secondary-fixed-dim": "#b9c7df",
                        "outline-variant": "#c3c6d7",
                        "tertiary-fixed": "#85f8c4",
                        "surface-container": "#eaeef2",
                        "primary-container": "#2563eb",
                        "inverse-on-surface": "#edf1f5",
                        "primary-light": "#DBEAFE",
                        "on-secondary-fixed": "#0d1c2e",
                        "warning-light": "#FEF3C7",
                        "on-surface": "#171c1f",
                        "on-tertiary-container": "#bdffdc",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#434655",
                        "surface": "#FFFFFF",
                        "surface-container-high": "#e4e9ed",
                        "outline": "#737686",
                        "tertiary-fixed-dim": "#68dba9",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary-fixed-variant": "#3a485b",
                        "error-container": "#ffdad6",
                        "primary": "#004ac6",
                        "error": "#DC2626",
                        "text-primary": "#0F172A",
                        "inverse-surface": "#2c3134",
                        "surface-container-low": "#f0f4f8",
                        "on-tertiary-fixed-variant": "#005137",
                        "on-primary-container": "#eeefff",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#dfe3e7",
                        "border": "#E2E8F0",
                        "on-tertiary-fixed": "#002114",
                        "on-secondary-container": "#57657a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "gutter": "16px",
                        "container-max-student": "480px",
                        "margin-desktop": "24px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "title-md": ["Inter"],
                        "headline": ["Inter"],
                        "body-md": ["Inter"],
                        "title-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "display": ["Inter"],
                        "caption": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline": ["26px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-lg": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]

                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-[72px] md:pb-0 md:flex md:justify-center">
<!-- Student Web Centered Container -->
<div class="w-full md:max-w-[container-max-student] bg-background min-h-screen relative shadow-lg">
<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant w-full h-[64px] flex items-center px-margin-mobile flex justify-between items-center sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-100 flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary font-bold">Doğru / Yanlış Soru</h1>
</div>
<button class="text-primary font-label-md text-label-md font-bold px-4 py-2 rounded-full hover:bg-primary-light transition-colors active:scale-95 duration-100">
                Kaydet
            </button>
</header>
<!-- Body Content -->
<main class="p-margin-mobile">
<div class="bg-surface rounded-xl p-4 shadow-sm border border-outline-variant flex flex-col gap-6">
<!-- Soru Metni Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="soru-metni">Soru Metni <span class="text-error">*</span></label>
<div class="relative">
<textarea class="w-full border border-outline rounded-lg p-4 font-body-md text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors resize-none placeholder-outline" id="soru-metni" placeholder="Sorunuzu buraya yazın..." rows="4"></textarea>
</div>
</div>
<!-- Settings Rows -->
<div class="flex flex-col gap-4 border-t border-outline-variant pt-4">
<!-- Puan Row -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">star</span>
<span class="font-body-md text-body-md">Puan</span>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface hover:bg-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">remove</span>
</button>
<span class="font-title-md text-title-md text-on-surface w-8 text-center">10</span>
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface hover:bg-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">add</span>
</button>
</div>
</div>
<!-- Timer Row -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">timer</span>
<span class="font-body-md text-body-md">Süre (Saniye)</span>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface hover:bg-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">remove</span>
</button>
<span class="font-title-md text-title-md text-on-surface w-8 text-center">60</span>
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface hover:bg-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">add</span>
</button>
</div>
</div>
</div>
<!-- Doğru Cevap Selection -->
<div class="flex flex-col gap-3 border-t border-outline-variant pt-4">
<label class="font-label-md text-label-md text-on-surface-variant">Doğru Cevap:</label>
<div class="flex gap-4">
<!-- Doğru (Selected State) -->
<button class="flex-1 h-[80px] rounded-lg bg-success flex flex-col items-center justify-center gap-1 shadow-md transform hover:-translate-y-1 transition-all active:scale-95 border border-success">
<span class="material-symbols-outlined text-[28px] text-on-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-title-md text-title-md text-on-primary">Doğru</span>
</button>
<!-- Yanlış (Unselected State) -->
<button class="flex-1 h-[80px] rounded-lg bg-surface border-2 border-outline-variant flex flex-col items-center justify-center gap-1 hover:bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-[28px] text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">cancel</span>
<span class="font-title-md text-title-md text-on-surface-variant">Yanlış</span>
</button>
</div>
</div>
</div>
<div class="mt-8 flex justify-end">
<button class="h-[56px] bg-primary-container text-on-primary font-title-md text-title-md rounded-full px-8 shadow-sm hover:bg-primary-dark active:scale-95 transition-all flex items-center justify-center w-full md:w-auto">
                    Soruyu Kaydet
                </button>
</div>
</main>
</div>
</body></html>
