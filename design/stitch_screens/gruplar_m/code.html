<!-- Container for Web Centering -->

<!-- TopAppBar (Customized for Screen 6) -->

<button aria-label="Yeni Grup Ekle" class="w-[48px] h-[48px] flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-[28px] text-primary">add</span>
</button>
</header>
<!-- Search Bar Area -->

<div class="relative w-full h-[56px]">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full h-full pl-[48px] pr-4 bg-surface border-border rounded-lg focus:border-primary focus:ring-1 focus:ring-primary text-body-md font-body-md text-on-background placeholder:text-outline transition-colors outline-none shadow-sm" placeholder="Grup ara..." type="text"/>
</div>

<button class="w-full min-h-[72px] bg-surface rounded-lg p-[12px] flex items-center gap-[16px] hover:shadow-md transition-shadow active:scale-[0.98] border border-border/50 text-left">
<div class="w-[48px] h-[48px] rounded-full bg-primary-light flex-shrink-0 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">school</span>
</div>
<div class="flex-grow flex flex-col justify-center overflow-hidden">
<span class="font-title-md text-title-md text-on-background truncate">12-A Matematik İleri Seviye</span>
<span class="font-caption text-caption text-secondary mt-[2px] truncate">8 sınav · Son: 2 gün önce</span>
</div>
<span class="material-symbols-outlined text-outline flex-shrink-0">chevron_right</span>
</button>
<!-- Group Card 2 -->
<button class="w-full min-h-[72px] bg-surface rounded-lg p-[12px] flex items-center gap-[16px] hover:shadow-md transition-shadow active:scale-[0.98] border border-border/50 text-left">
<div class="w-[48px] h-[48px] rounded-full bg-primary-light flex-shrink-0 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">science</span>
</div>
<div class="flex-grow flex flex-col justify-center overflow-hidden">
<span class="font-title-md text-title-md text-on-background truncate">11-B Fizik Olimpiyat</span>
<span class="font-caption text-caption text-secondary mt-[2px] truncate">4 sınav · Son: 1 hafta önce</span>
</div>
<span class="material-symbols-outlined text-outline flex-shrink-0">chevron_right</span>
</button>

<span class="material-symbols-outlined text-primary">menu_book</span>
</div>

<span class="font-title-md text-title-md text-on-background truncate">10-C Edebiyat Hazırlık</span>

<span class="material-symbols-outlined text-outline flex-shrink-0">chevron_right</span>
</button>
