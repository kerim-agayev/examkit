<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop bg-[#F1F5F9] text-text-primary">
<main class="w-full max-w-[480px] bg-surface rounded-[16px] p-[32px] md:shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-border">
<!-- Header / Logo -->

<div class="flex items-center gap-2 mb-6">
<div class="w-8 h-8 rounded-lg bg-primary-container/10 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">edit_document</span>
</div>
<span class="font-headline text-headline text-text-primary">ExamKit</span>
</div>
<h1 class="font-headline text-[28px] leading-[36px] font-bold text-center text-text-primary mb-2">Sınava Katıl</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Öğretmenin paylaştığı kodu gir</p>
</div>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<div class="relative">
<input autocomplete="off" class="w-full h-[56px] px-4 font-title-lg text-title-lg text-center uppercase tracking-[0.2em] text-text-primary bg-surface border-[1.5px] border-border rounded-xl focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors placeholder:text-outline-variant placeholder:font-normal" id="exam-code" maxlength="6" placeholder="MAT7K2" type="text"/>
</div>
</div>
<button class="w-full h-[56px] bg-[#2563EB] hover:bg-[#1d4ed8] active:bg-[#1e40af] text-on-primary font-title-md text-title-md rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-sm hover:shadow-md" type="submit">
                Devam
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="font-caption text-caption text-on-surface-variant flex items-center justify-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">bolt</span>
                Uygulama indirmeye gerek yok
            </p>
</div>
</main>
<script>
        // Simple micro-interaction for input uppercase enforcement and slight haptic feel
        const input = document.getElementById('exam-code');
        input.addEventListener('input', function(e) {
            this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        });
    </script>
