<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sınavı Paylaş - ExamKit</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "secondary-container": "#d5e3fc",

                      "on-error": "#ffffff",
                      "on-background": "#171c1f",
                      "success": "#059669",
                      "primary-fixed": "#dbe1ff",
                      "text-primary": "#0F172A",
                      "on-secondary-fixed-variant": "#3a485b",
                      "on-secondary-fixed": "#0d1c2e",

                      "on-secondary-container": "#57657a",

                      "tertiary-fixed-dim": "#68dba9",

                      "primary": "#004ac6",
                      "outline-variant": "#c3c6d7",
                      "on-tertiary-container": "#bdffdc",
                      "inverse-on-surface": "#edf1f5",
                      "background": "#f6fafe",
                      "surface-container-high": "#e4e9ed",
                      "on-surface": "#171c1f",
                      "border": "#E2E8F0",

                      "on-secondary": "#ffffff"

              "borderRadius": {
                      "DEFAULT": "0.25rem",

              "spacing": {

<style>
        body { background-color: #F1F5F9; }
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(5, 150, 105, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); }
        }
        /* Mobile-first constraints for Web */
        .app-container {
            max-width: theme('spacing.container-max-student');
            margin: 0 auto;
            min-height: 100vh;
            background-color: #F1F5F9;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-text-primary selection:bg-primary-light selection:text-primary-dark">
<div class="app-container">
<!-- TopAppBar -->
<header class="bg-surface border-b border-border w-full h-[64px] flex items-center justify-between px-margin-mobile flex-shrink-0 z-10 sticky top-0">
<div class="flex items-center gap-2">
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-full p-2 active:scale-95 duration-100 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<div class="text-center">
<h1 class="font-title-lg text-title-lg text-text-primary">Sınavı Paylaş</h1>
<p class="font-caption text-caption text-on-surface-variant mt-0.5">Adım 5 / 5</p>
</div>
<div class="w-10 h-10 flex items-center justify-center">
<!-- Progress indicator ring -->
<svg class="w-8 h-8 transform -rotate-90" viewbox="0 0 36 36">
<path class="text-surface-variant" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="4"></path>
<path class="text-primary-container" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="100, 100" stroke-width="4"></path>
</svg>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow px-margin-mobile py-6 flex flex-col gap-6 overflow-y-auto pb-32">
<!-- Hero Card: Exam Code -->
<section class="bg-surface rounded-2xl p-6 shadow-sm border border-border flex flex-col items-center text-center">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mb-4">Sınav Kodu</h2>
<div aria-label="Sınav Kodu: MAT7K2" class="flex gap-2 mb-6">
<div class="w-12 h-16 border border-border rounded-lg flex items-center justify-center bg-surface-bright shadow-sm">
<span class="font-mono text-[32px] font-bold text-primary-container leading-none">M</span>
</div>
<div class="w-12 h-16 border border-border rounded-lg flex items-center justify-center bg-surface-bright shadow-sm">
<span class="font-mono text-[32px] font-bold text-primary-container leading-none">A</span>
</div>
<div class="w-12 h-16 border border-border rounded-lg flex items-center justify-center bg-surface-bright shadow-sm">
<span class="font-mono text-[32px] font-bold text-primary-container leading-none">T</span>
</div>
<div class="w-12 h-16 border border-border rounded-lg flex items-center justify-center bg-surface-bright shadow-sm">
<span class="font-mono text-[32px] font-bold text-primary-container leading-none">7</span>
</div>
<div class="w-12 h-16 border border-border rounded-lg flex items-center justify-center bg-surface-bright shadow-sm">
<span class="font-mono text-[32px] font-bold text-primary-container leading-none">K</span>
</div>
<div class="w-12 h-16 border border-border rounded-lg flex items-center justify-center bg-surface-bright shadow-sm">
<span class="font-mono text-[32px] font-bold text-primary-container leading-none">2</span>
</div>
</div>
<button class="flex items-center gap-2 bg-surface-container-low hover:bg-surface-variant transition-colors px-4 py-2 rounded-lg text-on-surface-variant group">
<span class="font-caption text-[13px] tracking-wide">stitch.examkit.app/join/MAT7K2</span>
<span class="material-symbols-outlined text-[18px] group-hover:text-text-primary transition-colors">content_copy</span>
</button>
</section>
<!-- Action Grid -->
<section class="grid grid-cols-2 gap-4">
<!-- WhatsApp -->
<button class="bg-surface h-[96px] rounded-xl p-4 flex flex-col justify-between items-start border border-border shadow-sm hover:shadow-md hover:border-[#25D366] transition-all group text-left active:scale-[0.98]">
<div class="w-8 h-8 rounded-full bg-[#25D366]/10 flex items-center justify-center text-[#25D366]">
<!-- Using material icon as placeholder since WhatsApp isn't in material symbols, visually similar concept -->
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">forum</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-text-primary">WhatsApp'ta Paylaş</h3>
<p class="font-caption text-[11px] text-on-surface-variant mt-0.5">Mesaj hazır, gönder!</p>
</div>
</button>
<!-- QR Code -->
<button class="bg-surface h-[96px] rounded-xl p-4 flex flex-col justify-between items-start border border-border shadow-sm hover:shadow-md hover:border-info transition-all group text-left active:scale-[0.98]">
<div class="w-8 h-8 rounded-full bg-info-light flex items-center justify-center text-info">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_2</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-text-primary">QR Kod</h3>
<p class="font-caption text-[11px] text-on-surface-variant mt-0.5">Yansıt veya paylaş</p>
</div>
</button>
<!-- Copy Link -->
<button class="bg-surface h-[96px] rounded-xl p-4 flex flex-col justify-between items-start border border-border shadow-sm hover:shadow-md hover:border-secondary transition-all group text-left active:scale-[0.98]">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">link</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-text-primary">Linki Kopyala</h3>
<p class="font-caption text-[11px] text-on-surface-variant mt-0.5">Panoya kopyala</p>
</div>
</button>
<!-- Other Apps -->
<button class="bg-surface h-[96px] rounded-xl p-4 flex flex-col justify-between items-start border border-border shadow-sm hover:shadow-md hover:border-purple-500 transition-all group text-left active:scale-[0.98]">
<div class="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center text-purple-600">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">share</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-text-primary">Diğer Uygulamalar</h3>
<p class="font-caption text-[11px] text-on-surface-variant mt-0.5">Telegram, Mail...</p>
</div>
</button>
</section>
</main>
<!-- Bottom Sticky Area -->
<div class="fixed bottom-0 left-0 w-full md:w-[480px] md:left-1/2 md:-translate-x-1/2 bg-gradient-to-t from-[#F1F5F9] via-[#F1F5F9] to-transparent pt-12 pb-6 px-margin-mobile z-20 flex flex-col items-center gap-3">
<!-- Status Badge -->
<div class="bg-white px-4 py-2 rounded-full border border-border shadow-sm flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-success pulse-dot"></div>
<span class="font-label-md text-label-md text-text-primary">3 öğrenci bekleniyor</span>
</div>
<!-- Primary Button -->
<button class="w-full h-[56px] bg-success hover:bg-success-light hover:text-success hover:border hover:border-success text-white font-title-md text-title-md rounded-lg shadow-sm hover:shadow-md transition-all active:scale-[0.98] flex justify-center items-center gap-2 group">
            Canlı Kontrole Geç
            <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</body></html>
