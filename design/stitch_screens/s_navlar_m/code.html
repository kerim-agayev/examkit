<script>
        // Simple JS to toggle the mock context menu for demonstration if needed, 
        // though it's statically rendered above for visual output based on prompt.
        document.getElementById('exam-card-2').addEventListener('click', function() {
            const menu = this.nextElementSibling;
            if(menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                menu.classList.add('context-menu-enter');
            } else {
                menu.classList.add('hidden');
                menu.classList.remove('context-menu-enter');
            }
        });
    </script>
