<!DOCTYPE html>

<style>
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(0, 74, 198, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(0, 74, 198, 0);
            }
            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(0, 74, 198, 0);
            }
        }

        .animate-pulse-ring {
            animation: pulse-ring 2s infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-on-background px-margin-mobile">
<!-- Main Container -->
<main class="w-full max-w-container-max-student bg-surface rounded-xl shadow-sm border border-border p-8 flex flex-col items-center text-center relative overflow-hidden">
<!-- Decorative subtle background elements -->
<div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-primary-light/30 to-transparent pointer-events-none"></div>
<!-- Animated Pulse Circle -->
<div class="relative w-[120px] h-[120px] flex items-center justify-center mb-8">
<div class="absolute inset-0 rounded-full bg-primary/10 animate-pulse-ring"></div>
<div class="absolute inset-2 rounded-full bg-primary/20 animate-pulse-ring" style="animation-delay: 0.5s;"></div>
<div class="relative w-20 h-20 bg-primary rounded-full flex items-center justify-center shadow-md z-10">
<span class="material-symbols-outlined text-on-primary text-4xl" style="font-variation-settings: 'FILL' 1;">
                    hourglass_empty
                </span>
</div>
</div>
<!-- Typography & Content -->
<h1 class="font-headline text-headline text-text-primary mb-2">Müəllimi gözləyin...</h1>
<h2 class="font-title-md text-title-md text-on-surface-variant mb-6">Biologiya Final İmtahanı</h2>
<!-- Pill Badge -->
<div class="inline-flex items-center bg-success-light text-success px-4 py-2 rounded-full mb-8">
<span class="material-symbols-outlined mr-2 text-sm">group</span>
<span class="font-label-md text-label-md">Bekleme odasında: 8 öğrenci</span>
</div>
<!-- Helper Text -->
<div class="bg-surface-container-low rounded-lg p-4 w-full flex items-center justify-center space-x-3 mb-8 border border-surface-variant">
<span class="material-symbols-outlined text-primary">info</span>
<p class="font-body-md text-body-md text-on-surface-variant">Öğretmen başlatınca otomatik açılacak</p>
</div>
<!-- Bottom User Info -->
<div class="mt-auto pt-6 border-t border-border w-full flex items-center justify-center text-on-surface-variant">
<div class="flex items-center space-x-2">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-title-md text-title-md">
                    A
                </div>
<span class="font-body-md text-body-md">Katılan: Aynur Məmmədova</span>
<span class="material-symbols-outlined text-success text-sm ml-1">check_circle</span>
</div>
</div>
</main>
</body></html>
