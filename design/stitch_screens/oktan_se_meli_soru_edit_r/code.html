<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Soru Editörü - Çoktan Seçmeli</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#171c1f",
                        "on-primary-fixed": "#00174b",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-dim": "#d6dade",
                        "background": "#f6fafe",
                        "surface-container-lowest": "#ffffff",
                        "primary-dark": "#1E40AF",
                        "surface-tint": "#0053db",
                        "secondary-fixed": "#d5e3fc",
                        "info-light": "#E0F2FE",
                        "warning": "#D97706",
                        "success-light": "#D1FAE5",
                        "success": "#059669",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#007d57",
                        "secondary-container": "#d5e3fc",
                        "inverse-primary": "#b4c5ff",
                        "info": "#0284C7",
                        "surface-bright": "#f6fafe",
                        "primary-fixed-dim": "#b4c5ff",
                        "secondary": "#515f74",
                        "on-primary": "#ffffff",
                        "error-light": "#FEE2E2",
                        "surface-container-highest": "#dfe3e7",
                        "tertiary": "#006243",
                        "secondary-fixed-dim": "#b9c7df",
                        "outline-variant": "#c3c6d7",
                        "tertiary-fixed": "#85f8c4",
                        "surface-container": "#eaeef2",
                        "primary-container": "#2563eb",
                        "inverse-on-surface": "#edf1f5",
                        "primary-light": "#DBEAFE",
                        "on-secondary-fixed": "#0d1c2e",
                        "warning-light": "#FEF3C7",
                        "on-surface": "#171c1f",
                        "on-tertiary-container": "#bdffdc",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#434655",
                        "surface": "#FFFFFF",
                        "surface-container-high": "#e4e9ed",
                        "outline": "#737686",
                        "tertiary-fixed-dim": "#68dba9",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary-fixed-variant": "#3a485b",
                        "error-container": "#ffdad6",
                        "primary": "#004ac6",
                        "error": "#DC2626",
                        "text-primary": "#0F172A",
                        "inverse-surface": "#2c3134",
                        "surface-container-low": "#f0f4f8",
                        "on-tertiary-fixed-variant": "#005137",
                        "on-primary-container": "#eeefff",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#dfe3e7",
                        "border": "#E2E8F0",
                        "on-tertiary-fixed": "#002114",
                        "on-secondary-container": "#57657a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "gutter": "16px",
                        "container-max-student": "480px",
                        "margin-desktop": "24px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "title-md": ["Inter"],
                        "headline": ["Inter"],
                        "body-md": ["Inter"],
                        "title-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "display": ["Inter"],
                        "caption": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline": ["26px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-lg": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #2563eb;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #2563eb;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen text-on-background font-body-md antialiased pb-safe">
<!-- TopAppBar (Customized for Sub-page context) -->
<header class="bg-surface border-b border-outline-variant w-full h-[64px] flex justify-between items-center px-margin-mobile sticky top-0 z-50">
<div class="flex items-center gap-2">
<button class="text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors active:scale-95 duration-100 flex items-center justify-center h-10 w-10">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-text-primary">Çoktan Seçmeli Soru</h1>
</div>
<button class="text-primary-container font-title-md text-title-md hover:bg-surface-container-low px-4 py-2 rounded-lg transition-colors active:scale-95 duration-100">
            Kaydet
        </button>
</header>
<!-- Main Content Canvas -->
<main class="max-w-container-max-student mx-auto p-margin-mobile md:py-margin-desktop space-y-6">
<!-- Form Card -->
<div class="bg-surface rounded-xl p-4 md:p-6 shadow-sm border border-border">
<!-- Soru Metni -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant" for="soru_metni">Soru Metni <span class="text-error">*</span></label>
<div class="relative">
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-4 font-body-md text-body-md text-text-primary focus:border-primary-container focus:ring-1 focus:ring-primary-container resize-none transition-colors" id="soru_metni" placeholder="Soruyu buraya yazın..." rows="4"></textarea>
<div class="absolute bottom-3 right-4 font-caption text-caption text-outline">
                        0/500
                    </div>
</div>
</div>
<!-- Puan Row -->
<div class="mt-6 flex items-center justify-between bg-surface-container-low p-4 rounded-lg">
<span class="font-title-md text-title-md text-text-primary">Puan:</span>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full bg-surface border border-outline-variant flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-title-lg text-title-lg font-bold text-text-primary w-8 text-center">3</span>
<button class="w-10 h-10 rounded-full bg-surface border border-outline-variant flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Soru Süresi Timer -->
<div class="mt-4 p-4 border border-outline-variant rounded-lg space-y-4">
<div class="flex items-center justify-between">
<span class="font-body-lg text-body-lg text-text-primary">Soru Süresi</span>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-surface border-4 appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in-out border-outline-variant checked:translate-x-full checked:border-primary-container" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-variant cursor-pointer transition-colors duration-200 ease-in-out bg-primary-container" for="toggle"></label>
</div>
</div>
<!-- Slider Section (Visible when ON) -->
<div class="flex items-center gap-4" id="timer-slider-container">
<input class="w-full h-2 bg-surface-variant rounded-lg appearance-none cursor-pointer accent-primary-container" max="120" min="10" type="range" value="60"/>
<span class="font-label-md text-label-md text-on-surface-variant whitespace-nowrap min-w-[48px] text-right">60 sn</span>
</div>
</div>
<hr class="my-6 border-border border-t"/>
<!-- Seçenekler Section -->
<div class="space-y-4">
<h2 class="font-title-md text-title-md text-text-primary">Seçenekler</h2>
<!-- Option A -->
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center border border-outline-variant bg-surface font-title-md text-title-md text-on-surface-variant">A</div>
<input class="flex-grow h-12 px-4 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" placeholder="Seçenek A..." type="text"/>
<button class="w-12 h-12 flex items-center justify-center text-outline hover:text-primary-container active:scale-90 transition-all rounded-full flex-shrink-0">
<span class="material-symbols-outlined text-[28px]" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
</div>
<!-- Option B (Correct) -->
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center border-2 border-success bg-success-light font-title-md text-title-md text-success">B</div>
<input class="flex-grow h-12 px-4 rounded-lg border border-success bg-success-light/30 font-body-md text-body-md text-text-primary focus:outline-none transition-colors" placeholder="Seçenek B..." type="text" value="Doğru Cevap Metni"/>
<button class="w-12 h-12 flex items-center justify-center text-success active:scale-90 transition-all rounded-full flex-shrink-0">
<span class="material-symbols-outlined text-[28px]" data-icon="radio_button_checked" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
</button>
</div>
<!-- Option C -->
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center border border-outline-variant bg-surface font-title-md text-title-md text-on-surface-variant">C</div>
<input class="flex-grow h-12 px-4 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" placeholder="Seçenek C..." type="text"/>
<button class="w-12 h-12 flex items-center justify-center text-outline hover:text-primary-container active:scale-90 transition-all rounded-full flex-shrink-0">
<span class="material-symbols-outlined text-[28px]" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
</div>
<!-- Option D -->
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center border border-outline-variant bg-surface font-title-md text-title-md text-on-surface-variant">D</div>
<input class="flex-grow h-12 px-4 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" placeholder="Seçenek D..." type="text"/>
<button class="w-12 h-12 flex items-center justify-center text-outline hover:text-primary-container active:scale-90 transition-all rounded-full flex-shrink-0">
<span class="material-symbols-outlined text-[28px]" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
</div>
</div>
<!-- Confirmation Chip -->
<div class="mt-6 flex justify-center">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-success-light rounded-full text-success font-label-md text-label-md">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span>Doğru cevap: B</span>
</div>
</div>
</div>
</main>
<script>
        // Simple toggle logic for the slider visibility
        const toggleInput = document.getElementById('toggle');
        const sliderContainer = document.getElementById('timer-slider-container');

        toggleInput.addEventListener('change', function() {
            if(this.checked) {
                sliderContainer.style.display = 'flex';
                sliderContainer.style.opacity = '1';
            } else {
                sliderContainer.style.display = 'none';
                sliderContainer.style.opacity = '0';
            }
        });
    </script>
</body></html>
